name: SeraDish Daily Update

on:
  schedule:
    - cron: '0 0 * * *' # Protidin raat 12-tay auto run hobe
  workflow_dispatch: # Manual run korar option

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node 24 support activate kora holo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pandas gspread google-auth serpapi transformers torch

      - name: Run Scraper Script
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python main.py
