name: SeraDish Daily Update

on:
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন রাত ১২টায় অটো রান হবে
  workflow_dispatch: # যাতে আপনি চাইলে নিজেও 'Run' বাটনে ক্লিক করে আপডেট করতে পারেন

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas gspread google-auth serpapi transformers torch

      - name: Run Scraper Script
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python main.py
